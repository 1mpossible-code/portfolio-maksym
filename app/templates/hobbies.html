<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Hobbies">
    <meta property="og:description" content="My hobbies">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link lang='sass' rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel='icon' href="{{ url_for('static', filename='img/favicon.ico') }}" type='image/x-icon' />
    <title>{{ title }}</title>
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/">
                <div class="nav-logo">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" />
                </div>
            </a>
            <nav class="nav-links" aria-label="Main navigation">
                {% for link in nav_links %}
                    <a href="{{ url_for(link.endpoint) }}" class="{% if request.endpoint == link.endpoint %}active{% endif %}">{{ link.name }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main class="hobbies-page">
        <section class="hobbies-hero">
            <h1>Hobbies</h1>
            <p>Traveling, boxing, and business case competitions.</p>
        </section>

        <section class="hobby-grid" aria-label="Hobby cards">
            {% for hobby in hobbies %}
                <article class="hobby-card">
                    <img src="{{ url_for('static', filename=hobby.image) }}" alt="{{ hobby.name }}">
                    <h2>{{ hobby.name }}</h2>
                </article>
            {% endfor %}
        </section>
    </main>
</body>
</html>
